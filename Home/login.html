<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="./liedel/public/logo_sin_letras.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LieDel - Login Interactivo</title>

    <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            background:#ababf8;
            overflow:hidden;
        }

        .login-container{
            position:relative;
            width:430px;
            height:560px;
            border-radius:28px;
            overflow:hidden;
            background:rgba(255,255,255,0.12);
            backdrop-filter:blur(10px);
            box-shadow:0 15px 40px rgba(0,0,0,0.25);
        }

        .login-form-panel{
            position:absolute;
            top:0;
            left:0;
            width:100%;
            height:100%;
            padding:45px;
            display:flex;
            flex-direction:column;
            justify-content:center;
            background:rgba(255,255,255,0.96);
            border-radius:28px;
            z-index:1;
        }

        .login-form-panel h2{
            color:#F6BE28;
            margin-bottom:35px;
            font-size:34px;
            font-weight:700;
            text-align:center;
        }

        .input-group{
            position:relative;
            margin-bottom:24px;
        }

        .input-group input{
            width:100%;
            padding:15px 45px 15px 15px;
            border:none;
            border-bottom:2px solid #d5d5d5;
            background:transparent;
            outline:none;
            font-size:16px;
            transition:0.3s;
        }

        .input-group input:focus{
            border-color:#ff8c32;
        }

        .toggle-password{
            position:absolute;
            right:12px;
            top:50%;
            transform:translateY(-50%);
            cursor:pointer;
            color:#7a828a;
            transition:0.3s;
        }

        .toggle-password:hover{
            color:#F6BE28;
        }

        .submit-btn{
            background:#2A64D7;
            color:white;
            border:none;
            padding:15px;
            border-radius:14px;
            font-size:17px;
            font-weight:600;
            cursor:pointer;
            margin-top:20px;
            width:100%;
            transition:0.3s ease;
        }

        .submit-btn:hover{
            transform:translateY(-3px);
            box-shadow:0 10px 20px rgba(75,29,115,0.25);
        }

        .logo-cover-panel{
            position:absolute;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:linear-gradient(160deg,#ffffff,#f7f4ff);
            border-radius:28px;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            padding:25px;
            z-index:2;
            transition:transform 0.7s cubic-bezier(0.77,0,0.175,1);
            box-shadow:5px 0 15px rgba(0,0,0,0.05);
        }

        .logo-img{
            width:500px;
            max-width:200%;
            object-fit:contain;
            filter:drop-shadow(0 15px 28px rgba(0,0,0,0.22));
            transition:0.4s ease;
        }

        .logo-cover-panel:hover .logo-img{
            transform:scale(1.06);
        }

        .about-us-box{
            width:100%;
            text-align:center;
            border-top:1px solid #ececec;
            padding-top:18px;
            margin-top:20px;
        }

        .about-us-link{
            display:inline-flex;
            align-items:center;
            gap:6px;
            color:#6b21a8;
            text-decoration:none;
            font-size:14px;
            font-weight:500;
            transition:0.3s;
        }

        .about-us-link:hover{
            color:#ff8c32;
        }

        .login-container:hover .logo-cover-panel{
            transform:translateX(-100%);
            border-radius:28px 0 0 28px;
        }

        .error-message{
            margin-top:15px;
            color:red;
            text-align:center;
            font-size:14px;
        }

    </style>
</head>

<body>

    <div class="login-container">

        <!-- FORM LOGIN -->

        <div class="login-form-panel">

            <h2>Iniciar Sesión</h2>

            <form id="loginForm">

                <div class="input-group">

                    <input
                        type="text"
                        id="username"
                        placeholder="Usuario o Correo"
                        required
                    >

                </div>

                <div class="input-group">

                    <input
                        type="password"
                        id="password"
                        placeholder="Contraseña"
                        required
                    >

                    <span
                        class="material-symbols-outlined toggle-password"
                        onclick="togglePasswordVisibility()">

                        visibility

                    </span>

                </div>

                <button
                    type="submit"
                    class="submit-btn">

                    Ingresar al Sistema

                </button>

            </form>

            <p id="error" class="error-message"></p>

        </div>

        <!-- PANEL LOGO -->

        <div class="logo-cover-panel">

            <img
                src="./images/logo_liedel.png"
                alt="LieDel Logo"
                class="logo-img"
            >

            <div class="about-us-box">

                <a
                    href="#about"
                    class="about-us-link"

                    onclick="showAbout()">

                    <span
                        class="material-symbols-outlined"
                        style="font-size:18px;">

                        info

                    </span>

                    Acerca de nosotros

                </a>

            </div>

        </div>

    </div>

    <script>

        function togglePasswordVisibility(){

            const passwordField =
            document.getElementById('password');

            const toggleIcon =
            document.querySelector('.toggle-password');

            if(passwordField.type === 'password'){

                passwordField.type = 'text';

                toggleIcon.textContent =
                'visibility_off';

            }else{

                passwordField.type = 'password';

                toggleIcon.textContent =
                'visibility';
            }
        }

        function showAbout(){

            alert(
                'LieDel - Smart Data Solutions\n\n' +
                'Sistema Avanzado de Análisis y Optimización de Datos.'
            );
        }

        document
            .getElementById("loginForm")
            .addEventListener("submit", async function(event) {

            event.preventDefault();

            const username =
                document.getElementById("username").value;

            const password =
                document.getElementById("password").value;

            try {

                const response = await fetch(
                    "http://127.0.0.1:5000/login",
                    {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            username,
                            password
                        })
                    }
                );

                const result = await response.json();

                if(result.success){

                    const params = new URLSearchParams({

                        usuario: result.usuario,
                        nombre: result.nombre,
                        apellido: result.apellido,
                        email: result.email,
                        puesto: result.puesto

                    });

                    window.location.href =
                    `http://localhost:5173?${params.toString()}`;

                }else{

                    document.getElementById("error")
                        .innerText =
                        "Credenciales incorrectas";
                }

            }catch(error){

                document.getElementById("error")
                    .innerText =
                    "Error conectando con el servidor";

                console.error(error);
            }

        });

    </script>

</body>
</html>
