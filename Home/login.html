<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="./liedel/public/logo_sin_letras.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./estilo/style.css">
    <title>LieDel - Login Interactivo</title>

    <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>

<body>

    <div class="login-container">
        <div class="login-form-panel">

            <h2>Login</h2>

            <form id="loginForm">
                <div class="input-group">
                    <input
                        type="text"
                        id="username"
                        placeholder="Usuario o Correo"
                        required
                    >

                </div>

                <div class="input-group">
                    <input
                        type="password"
                        id="password"
                        placeholder="Contraseña"
                        required
                    >

                    <span
                        class="material-symbols-outlined toggle-password"
                        onclick="togglePasswordVisibility()">

                        visibility
                    </span>
                </div>

                <button
                    type="submit"
                    class="submit-btn">
                    Ingresar al Sistema
                </button>

            </form>

            <p id="error" class="error-message"></p>

        </div>


        <div class="logo-cover-panel">
            <img
                src="./images/logo_liedel.png"
                alt="LieDel Logo"
                class="logo-img"
            >

            <div class="about-us-box">

                <a
                    href="#about"
                    class="about-us-link"
                    onclick="showAbout()">

                    <span
                        class="material-symbols-outlined"
                        style="font-size:18px;">

                        info
                    </span>

                    Acerca de nosotros

                </a>

            </div>
        </div>
    </div>

    <script>

        function togglePasswordVisibility(){

            const passwordField =
            document.getElementById('password');

            const toggleIcon =
            document.querySelector('.toggle-password');

            if(passwordField.type === 'password'){

                passwordField.type = 'text';

                toggleIcon.textContent =
                'visibility_off';

            }else{

                passwordField.type = 'password';

                toggleIcon.textContent =
                'visibility';
            }
        }

        function showAbout(){

            alert(
                'LieDel - Smart Data Solutions\n\n' +
                'Sistema Avanzado de Análisis y Optimización de Datos.'
            );
        }

        document
            .getElementById("loginForm")
            .addEventListener("submit", async function(event) {

            event.preventDefault();

            const username =
                document.getElementById("username").value;

            const password =
                document.getElementById("password").value;

            try {

                const response = await fetch(
                    "http://127.0.0.1:5000/login",
                    {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            username,
                            password
                        })
                    }
                );

                const result = await response.json();

                if(result.success){

                    const params = new URLSearchParams({

                        usuario: result.usuario,
                        nombre: result.nombre,
                        apellido: result.apellido,
                        email: result.email,
                        puesto: result.puesto

                    });

                    window.location.href =
                    `http://localhost:5173?${params.toString()}`;

                }else{

                    document.getElementById("error")
                        .innerText =
                        "Credenciales incorrectas";
                }

            }catch(error){

                document.getElementById("error")
                    .innerText =
                    "Error conectando con el servidor";

                console.error(error);
            }

        });

    </script>

</body>
</html>
